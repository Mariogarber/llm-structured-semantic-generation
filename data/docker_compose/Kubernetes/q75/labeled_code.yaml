apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deploy-2
  labels:
    app: db
spec:
  selector:
    matchLabels:
      app: db
  replicas: 3
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: mongo
        image: mongo
        resources:
          requests:
            cpu: 100m
            memory: 150Mi
          limits:
            memory: 200Mi
