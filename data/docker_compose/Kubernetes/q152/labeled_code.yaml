apiVersion: v1
kind: Pod
metadata:
  name: spread-pod
spec:
  containers:
    - name: nginx-container
      image: nginx:latest
  topologySpreadConstraints:
    - maxSkew: 2
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
