apiVersion: v1
kind: Pod
metadata:
  name: hello-limited
spec:
  containers:
    - name: hello
      image: gcr.io/google-samples/hello-app:1.0
      resources:
        requests:
          cpu: "250m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
      ports:
        - containerPort: 8080
          name: http
          protocol: TCP