apiVersion: v1
kind: ServiceAccount
metadata:
  name: ds-service-account

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-service-account-set
spec:
  selector:
    matchLabels:
      name: ds-service-account-set
  template:
    metadata:
      labels:
        name: ds-service-account-set
    spec:
      serviceAccountName: ds-service-account
      containers:
      - name: ds-service-account-container
        image: busybox
        command: [ "sh", "-c", "while true; do echo 'Running with service account'; sleep 10; done" ]
