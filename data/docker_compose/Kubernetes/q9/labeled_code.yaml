apiVersion: batch/v1
kind: CronJob
metadata:
  name: x-job
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: busybox
            image: busybox
            args:
            - "/bin/sh"
            - "-c"
            - "sleep 65"
          restartPolicy: Never
