apiVersion: batch/v1 
kind: Job 
metadata:   
  name: simple-job-demo   
  labels:     
    jobgroup: simpledemo 
spec:   
  template:     
    metadata:       
      name: kubejob       
      labels:         
        jobgroup: simpledemo     
    spec:       
      containers:       
      - name: c         
        image: devopscube/kubernetes-job-demo:latest         
        args: ["50"]       
      restartPolicy: OnFailure
