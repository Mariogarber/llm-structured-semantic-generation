apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  key: value
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-ds
spec:
  selector:
    matchLabels:
      name: my-ds
  template:
    metadata:
      labels:
        name: my-ds
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
        - name: shared-data
          mountPath: /var/shared-data
        - name: nginx-config-volume
          mountPath: /etc/nginx/config
      volumes:
      - name: shared-data
        emptyDir: {}
      - name: nginx-config-volume
        configMap:
          name: nginx-config
