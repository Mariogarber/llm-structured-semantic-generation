apiVersion: batch/v1
kind: Job
metadata:
  name: example
spec:
  completions: 3
  parallelism: 3
  completionMode: Indexed
  template:
    spec:
      restartPolicy: Never
      containers:
      - command:
        - 'bash'
        - '-c'
        - 'echo ${JOB_COMPLETION_INDEX}'
        image: 'docker.io/library/bash'
        name: example