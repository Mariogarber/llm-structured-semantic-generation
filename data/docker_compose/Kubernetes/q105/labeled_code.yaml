apiVersion: batch/v1
kind: Job
metadata:
  name: failjob
spec:
  completions: 4
  parallelism: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: main
        image: alpine
        command:
        - "sh"
        - "-c"
        - "sleep 5 && exit 42"
  podFailurePolicy:
    rules:
    - action: FailJob
      onExitCodes:
        containerName: main
        operator: In
        values: [42]
