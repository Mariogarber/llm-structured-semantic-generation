apiVersion: v1
kind: Pod
metadata:
  name: nginx-token
spec:
  containers:
  - image: nginx
    name: nginx-token
    volumeMounts:
    - mountPath: /var/run/secrets/tokens
      name: vault-token
  volumes:
  - name: vault-token
    projected:
      sources:
      - serviceAccountToken:
          path: vault-token
          expirationSeconds: 601
          audience: vault