apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    app: MyApp
  type: NodePort
  ports:
    - name: http
      nodePort: 30475
      port: 8089
      targetPort: 8080
    - name: metrics
      nodePort: 31261
      port: 5555
      targetPort: 5555
    - name: health
      nodePort: 30013
      port: 8443
      targetPort: 8085