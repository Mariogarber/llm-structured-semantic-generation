apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: backend
  labels:
    app: database
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      tier: backend
  template:
    metadata:
      labels:
        tier: backend
    spec:
      containers:
      - name: db-container
        image: mongo:latest
