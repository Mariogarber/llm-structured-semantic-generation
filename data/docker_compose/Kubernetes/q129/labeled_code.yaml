---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-backup-volume
  labels:
    volume: nfs-backup-volume
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: "my-nfs-server"
    path: "/my/nfs/"
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: nfs-backup-volume-claim
spec:
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
  accessModes:
    - ReadWriteMany
  selector:
    matchLabels:
      volume: nfs-backup-volume