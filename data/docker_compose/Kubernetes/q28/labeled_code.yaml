apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-liveness-probe
spec:
  selector:
    matchLabels:
      name: ds-liveness-probe
  template:
    metadata:
      labels:
        name: ds-liveness-probe
    spec:
      containers:
      - name: ds-liveness-container
        image: busybox
        args:
        - /bin/sh
        - -c
        - touch /tmp/healthy; sleep 5; rm -f /tmp/healthy; sleep 600
        livenessProbe:
          exec:
            command:
            - cat
            - /tmp/healthy
          initialDelaySeconds: 5
          periodSeconds: 5
