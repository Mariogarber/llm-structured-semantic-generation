apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-hostport
spec:
  selector:
    matchLabels:
      app: ds-hostport
  template:
    metadata:
      labels:
        app: ds-hostport
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - name: http
          containerPort: 80
          hostPort: 30080