apiVersion: v1
kind: Secret
metadata:
  name: normal-secret
data:
  secret-file: dmFsdWUtMQo=
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
spec:
  volumes:
    - name: secret-volume
      secret:
        secretName: normal-secret
  containers:
    - name: test-container
      image: busybox
      command: 
        - /bin/sh
        - -c
        - ls -l /etc/secret-volume; sleep 1200
      volumeMounts:
        - name: secret-volume
          readOnly: true
          mountPath: "/etc/secret-volume"