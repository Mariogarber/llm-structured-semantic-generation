apiVersion: v1
kind: Pod
metadata:
  name: selinuxoptions2
spec:
  containers:
  - image: busybox
    name: container1
    command: ["/bin/sh", "-c", "sleep 600"]
    securityContext:
      seLinuxOptions:
        level: examplelevel
        type: container_init_t
  initContainers:
  - image: busybox
    name: initcontainer1
    securityContext:
      seLinuxOptions:
        type: container_kvm_t
  securityContext:
    seLinuxOptions:
      type: container_t
