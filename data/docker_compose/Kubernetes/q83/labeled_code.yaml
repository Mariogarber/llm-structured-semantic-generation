apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-dep-correct
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: php-config
        configMap:
          name: php-config
      - name: persistent-storage
        persistentVolumeClaim:
          claimName: nfs-pvc
      containers:
      - image: php-fpm:7.2
        name: php
        ports:
        - containerPort: 9000
      - image: nginx:latest
        name: nginx
        ports:
        - containerPort: 80
