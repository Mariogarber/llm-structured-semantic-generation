services:

  front-envoy:
    build:
      context: .
      dockerfile: ../Dockerfile
    depends_on:
      backend-service:
        condition: service_healthy
    ports:
    - "${PORT_BACKEND:-8002}:10000"
    - "${PORT_STATS:-8003}:8001"

  backend-service:
    build:
      context: ../python
      target: aiohttp-service
    volumes:
    - ./service.py:/code/service.py
