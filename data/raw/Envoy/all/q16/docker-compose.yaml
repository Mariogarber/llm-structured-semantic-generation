services:

  testing:
    build:
      context: .
      dockerfile: ./shared/envoy/Dockerfile
      args:
        ENVOY_CONFIG: labeled_code.yaml
    ports:
    - "${PORT_PROXY:-10000}:10000/udp"
    - "${PORT_ADMIN:-10001}:10001"

  service-udp:
    build:
      context: .
      dockerfile: Dockerfile-udp
