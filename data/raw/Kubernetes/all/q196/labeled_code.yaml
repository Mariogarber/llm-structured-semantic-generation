apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset-limits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-limits
  template:
    metadata:
      labels:
        app: nginx-limits
    spec:
      containers:
      - name: nginx-container-limits
        image: nginx:latest
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"