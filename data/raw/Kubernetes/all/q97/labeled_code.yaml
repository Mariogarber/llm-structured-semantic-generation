apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-ing2
spec:
  rules:
  - http:
      paths:
      - path: /app1
        pathType: Prefix
        backend:
          service:
            name: svc-1
            port:
              number: 8080
      - path: /app2
        pathType: Prefix
        backend:
          service:
            name: svc-2
            port:
              number: 9090
  tls:
  - hosts:
    - example.com
    secretName: example-tls
