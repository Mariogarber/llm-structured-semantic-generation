apiVersion: batch/v1
kind: CronJob
metadata:
  name: env-job
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: busybox
            image: busybox:latest
            command: ["/bin/sh", "-c", "echo $CRON_NAME"]
            env:
            - name: CRON_NAME
              value: "CronTest"
          restartPolicy: OnFailure
