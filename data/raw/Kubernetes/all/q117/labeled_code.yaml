apiVersion: batch/v1
kind: Job
metadata:
  name: example
spec:
  template:
    spec:
      containers:
      - name: perl
        image: perl:latest
        command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(1000)"]
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
      restartPolicy: Never