apiVersion: v1
kind: ServiceAccount
metadata:
  name: kettle
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kettle-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kettle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kettle
  template:
    metadata:
      labels:
        app: kettle
    spec:
      serviceAccountName: kettle
      containers:
      - name: kettle
        image: busybox
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c", "sleep 600"]
        env:
        - name: DEPLOYMENT
          value: prod
        - name: SUBSCRIPTION_PATH
          value: local-subscription
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: kettle-data
