apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv
spec:
  capacity:
    storage: 50Mi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: local-pvc-pod
spec:
  containers:
  - name: my-container
    image: alpine
    command:
    - "/bin/sh"
    - "-c"
    - "echo 'It is persistent!' > /mnt/volume/message.txt; while true; do sleep 10; done"
    volumeMounts:
    - name: my-storage
      mountPath: /mnt/volume
  volumes:
  - name: my-storage
    persistentVolumeClaim:
      claimName: local-pvc
