apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: busybox-replicaset
spec:
  replicas: 2
  selector:
    matchLabels:
      app: busybox # *
  template:
    metadata:
      labels:
        app: busybox # *
    spec:
      containers:
      - name: busybox-container # *
        image: busybox:latest
        command: ["sleep", "3600"]