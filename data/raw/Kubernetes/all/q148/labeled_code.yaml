apiVersion: v1
kind: ConfigMap
metadata:
  name: config1
data:
  key1: "file1value"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config2
data:
  key2: "file2value"
---
apiVersion: v1
kind: Pod
metadata:
  name: multiconfig-pod
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["sh", "-c", "sleep 1200"]
    volumeMounts:
    - name: config1-volume
      mountPath: "/etc/config1"
    - name: config2-volume
      mountPath: "/etc/config2"
  volumes:
  - name: config1-volume
    configMap:
      name: config1
  - name: config2-volume
    configMap:
      name: config2
