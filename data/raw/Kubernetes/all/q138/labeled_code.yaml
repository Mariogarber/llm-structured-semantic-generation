apiVersion: v1
kind: PersistentVolume
metadata:
  name: iscsi-pv
spec:
  storageClassName: iscsi-storage # *
  capacity:
    storage: 6Gi
  accessModes:
    - ReadWriteOnce
  iscsi:
    targetPortal: 10.0.0.1:3260
    iqn: iqn.2023-08.com.example:storage # *
    lun: 0
    fsType: ext4
    readOnly: false