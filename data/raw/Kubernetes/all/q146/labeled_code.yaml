apiVersion: v1
kind: ConfigMap
metadata:
  name: my-config
data:
  VAR1: "value1"
  VAR2: "value2"
---
apiVersion: v1
kind: Pod
metadata:
  name: env-pod
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["/bin/sh", "-c", "echo $VAR1; echo $VAR2; sleep 1200"]
    envFrom:
      - configMapRef:
          name: my-config
