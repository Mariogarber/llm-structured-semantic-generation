apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
spec:
  containers:
  - name: my-container
    image: busybox
    command: ["/bin/sh", "-c", "echo 'Hello World' > /tmp/volume/message.txt; sleep 1200"]
    volumeMounts:
    - name: my-volume
      mountPath: /tmp/volume
  volumes:
  - name: my-volume
    emptyDir: {}
