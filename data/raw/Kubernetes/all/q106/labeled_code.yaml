apiVersion: batch/v1
kind: Job
metadata:
  name: failjob-ignored
spec:
  completions: 4
  parallelism: 2
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: main
        image: alpine
        command:
        - "sh"
        - "-c"
        - "sleep 5 && exit 0"
  backoffLimit: 0
  podFailurePolicy:
    rules:
    - action: Ignore
      onPodConditions:
      - type: DisruptionTarget